basePath: "/api/v1"
definitions:
  update_user.UpdateUserInput:
    properties:
      email:
        type: "string"
      full_name:
        type: "string"
      id:
        type: "integer"
      password:
        minLength: 8
        type: "string"
    required:
      - "id"
    type: "object"
  dto.DeactivateUserResponseDTO:
    properties:
      deactivated:
        example: true
        type: "boolean"
      id:
        example: 1
        type: "integer"
    type: "object"
  dto.RegisterRequest:
    properties:
      email:
        example: "user@example.com"
        type: "string"
      full_name:
        example: "John Doe"
        type: "string"
      password:
        example: "strongpassword123"
        minLength: 6
        type: "string"
    required:
      - "email"
      - "full_name"
      - "password"
    type: "object"
  dto.UserResponseDTO:
    properties:
      full_name:
        type: "string"
      id:
        example: 1
        type: "integer"
      created_at:
        example: "2023-10-27T10:00:00Z"
        type: "string"
      email:
        type: "string"
    type: "object"
host: "localhost:8080"
info:
  contact:
    name: "API Support"
  description: "This is a Go backend template using DDD architecture."
  title: "Go DDD API Template"
  version: "1.0"
paths:
  /users:
    post:
      produces:
        - "application/json"
      responses:
        201:
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
          description: "Created"
        400:
          description: "Bad Request"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
      summary: "Register a new user"
      tags:
        - "users"
      consumes:
        - "application/json"
      description: "Create a new user account"
      parameters:
        -           description: "User registration details"
          in: "body"
          name: "request"
          required: true
          schema:
            $ref: "#/definitions/dto.RegisterRequest"
  /users/{id}:
    delete:
      responses:
        200:
          schema:
            $ref: "#/definitions/dto.DeactivateUserResponseDTO"
          description: "OK"
        400:
          description: "Bad Request"
          schema:
            $ref: "#/definitions/dto.DeactivateUserResponseDTO"
        404:
          description: "Not Found"
          schema:
            $ref: "#/definitions/dto.DeactivateUserResponseDTO"
      summary: "Deactivate an existing user"
      tags:
        - "users"
      description: "Deactivate user by their unique ID"
      parameters:
        -           description: "User ID"
          in: "path"
          name: "id"
          required: true
          type: "integer"
    get:
      parameters:
        -           description: "User ID"
          in: "path"
          name: "id"
          required: true
          type: "integer"
      produces:
        - "application/json"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
        404:
          description: "Not Found"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
      summary: "Get a user by ID"
      tags:
        - "users"
      description: "Get user details by their unique ID"
    put:
      consumes:
        - "application/json"
      description: "Update user details by their unique ID"
      parameters:
        -           name: "id"
          required: true
          type: "integer"
          description: "User ID"
          in: "path"
        -           name: "request"
          required: true
          schema:
            $ref: "#/definitions/update_user.UpdateUserInput"
          description: "User update details"
          in: "body"
      produces:
        - "application/json"
      responses:
        200:
          description: "OK"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
        400:
          description: "Bad Request"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
        404:
          description: "Not Found"
          schema:
            $ref: "#/definitions/dto.UserResponseDTO"
      summary: "Update an existing user"
      tags:
        - "users"
swagger: "2.0"